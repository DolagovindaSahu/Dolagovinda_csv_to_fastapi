<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Student Portal{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col text-gray-800">

  <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 flex items-center justify-between h-14">
      <span class="font-semibold text-gray-900 text-sm">📋 Student Portal</span>
      <div class="flex gap-1">
        <a href="{{ url_for('dashboard') }}" class="px-4 py-1.5 rounded-md text-sm font-medium transition-colors {% if request.endpoint == 'dashboard' %}bg-indigo-50 text-indigo-600{% else %}text-gray-500 hover:bg-gray-100 hover:text-gray-900{% endif %}">Dashboard</a>
        <a href="{{ url_for('students') }}" class="px-4 py-1.5 rounded-md text-sm font-medium transition-colors {% if request.endpoint == 'students' %}bg-indigo-50 text-indigo-600{% else %}text-gray-500 hover:bg-gray-100 hover:text-gray-900{% endif %}">All Students</a>
        <a href="{{ url_for('filter_students') }}" class="px-4 py-1.5 rounded-md text-sm font-medium transition-colors {% if request.endpoint == 'filter_students' %}bg-indigo-50 text-indigo-600{% else %}text-gray-500 hover:bg-gray-100 hover:text-gray-900{% endif %}">Filter</a>
        <a href="{{ url_for('seed') }}" class="px-4 py-1.5 rounded-md text-sm font-medium transition-colors {% if request.endpoint == 'seed' %}bg-indigo-50 text-indigo-600{% else %}text-gray-500 hover:bg-gray-100 hover:text-gray-900{% endif %}">Seed Data</a>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 w-full">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="mt-4 px-4 py-3 rounded-lg text-sm font-medium {% if category == 'success' %}bg-emerald-50 text-emerald-700 border border-emerald-200{% else %}bg-red-50 text-red-700 border border-red-200{% endif %}">
          {{ message }}
        </div>
      {% endfor %}
    {% endwith %}
  </div>

  <main class="max-w-7xl mx-auto px-6 py-8 w-full flex-1">
    {% block content %}{% endblock %}
  </main>

  <footer class="bg-white border-t border-gray-200 px-6 py-3 flex justify-between items-center text-xs text-gray-400">
    <span>CSV to FastAPI — Student Portal</span>
    <a href="http://localhost:8000/docs" target="_blank" class="text-indigo-400 hover:underline">FastAPI docs :8000/docs</a>
  </footer>

</body>
</html>
